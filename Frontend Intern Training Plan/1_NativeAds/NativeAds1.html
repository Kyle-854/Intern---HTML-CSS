<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Ads 1</title>
    <link rel="stylesheet" href="./css/NativeAds1Styles.css">
</head>
<body>
    <div class="native">
        <div class="native__Img">
            <img src="../assets/images/image.png" alt="Ảnh">
        </div>
        <div class="native__Info">
            <h2 class="native__Title">Vì sao nhiều cha mẹ vẫn e ngại về vaccine HPV?</h2>
            <p class="native__Description">Tiêm đầy đủ các vaccine HPV giúp bảo vệ hiệu quả và toàn diện trước các chứng HPV nguy hiểm.</p>
            <hr class="line">
            <div class="koBietDatTen">
                <div class="native__Brand">
                    <img src="../assets/images/Logo SmartAds.svg" alt="Logo SmartAds">
                    <p>| VNVC</p>
                </div>
                <div class="native__Register">
                    <a href="#" class="register-Button">Đăng ký ngay</a>
                    <img src="../assets/images/icon-arrow.svg" alt="mũi tên">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
