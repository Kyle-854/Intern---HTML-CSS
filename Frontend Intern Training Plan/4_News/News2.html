<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News2</title>
    <link rel="stylesheet" href="./css/News2Style.css">
</head>
<body>
    <div class="news">
        <button class="news__Close">
            <img src="../assets/images/close_fill.svg" alt="Close">
        </button>
        <div class="news__content">
            <div class="news__subcontent">
                <img class="news__Img" src="../assets/images/People.png" alt="Ảnh">

                <div class="news__Info">
                    <h2 class="news__title">
                        Bcons City Dĩ An 2,2 tỷ đồng căn 2 phòng ngủ, giao nhà hoàn thiện
                    </h2>
                    <div class="news__brand">
                        <img src="../assets/images/Logo_SMA.svg" alt="logo SMA">
                        <p class="divider">|</p>
                        <p>Sponsored by <strong>Bcons Home</strong></p>
                        <img class="verified" src="../assets/images/verified 1.svg" alt="">
                    </div>
                </div>
            </div>  
            <div class="news__button">
                <a href="#" class="button">
                    <img src="../assets/images/arrow_right_line.svg" alt="mũi tên phải">
                </a>
            </div>
        </div>
    </div>
</body>
</html>
