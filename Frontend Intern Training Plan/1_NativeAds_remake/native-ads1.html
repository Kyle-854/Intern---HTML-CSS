<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Ads 1 - remake</title>
    <link rel="stylesheet" href="./css/native-ads1.css">
</head>
<body>
    <div class="native">
        <div class="native__img-container">
            <img class="native__img" src="../assets/images/image.png" alt="Ảnh 4x3" >
        </div>
        <div class="native__content">
            <div class="native__info">
                <h2 class="native__title">
                    Vì sao nhiều cha mẹ vẫn e ngại về vaccine HPV?
                </h2>
                <p class="native__decription">
                    Tiêm đầy đủ các vaccine HPV giúp bảo vệ hiệu quả và toàn diện trước các chứng HPV nguy hiểm.
                </p>
            </div>

            <hr class="line">

            <div class="native__footer">
                <div class="native__brand">
                    <img src="../assets/images/Logo SmartAds full.svg" alt="logoSMA">
                    <div class="rectangle"></div>
                    <p class="partner">VNVC</p>
                </div>
                <a class="native__register" href="#">
                    <p>Đăng ký ngay</p>
                    <img class="vecter" src="../assets/images/Vector 1.svg" alt="">
                </a>
            </div>
        </div>
    </div>
</body>
</html>
