<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Native Ads 2 - remake</title>
    <link rel="stylesheet" href="./css/native-ads2.css">
</head>
<body>
    <div class="native">
        <div class="native__img-container">
            <img src="../assets/images/image (1).png" alt="Picture">
        </div>

        <div class="native__content">
            <div class="native__info">
                <h2 class="native__title">
                    Vinhomes Cần Giờ ra mắt đợt 1: Nhà 'tựa rừng, view hồ' 800 ha
                </h2>
                <p class="native__decription">
                    Phân khu sở hữu nhiều tiện ích nhất, đa dạng loại hình sản phẩm nhà phố, villa ven hồ trung tâm
                </p>
            </div>

            <div class="native__brand">
                <div class="logo-container">
                    <img class="logoSMA" src="../assets/images/logo-sma.svg" alt="logoSMA">

                    <div class="logo2">
                        <img class="textSMA" src="../assets/images/SmartAds.svg" alt="textSMA">

                        <div class="power">
                            <img class="powered-by" src="../assets/images/Vector.svg" alt="powered-by">
                            <img class="FPT-Online" src="../assets/images/Group 44.svg" alt="fpt-online">
                        </div>
                    </div>
                </div>
                <div class="divider"></div>
                <p class="partner">Sponsored by <strong>Bcons Home</strong></p>
                <img class="verified" src="../assets/images/verified 1.svg" alt="verified">
            </div>
        </div>
    </div>
</body>
</html>
