<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Video 1</title>
    <link rel="stylesheet" href="./css/BrandVideo1Style.css">
</head>
<body>
    <div class="brand-video">
        <div class="brand-video__ad">
            <img src="../assets/images/Icon Advertising.svg" alt="ic_ad">
            <p>Quảng cáo</p>
        </div>
        <div class="brand-video__content">
            <iframe src="https://www.youtube.com/embed/9ihe9kPb4FY?si=vMCrm7Sx6m5osyvH" frameborder="0" class="brand-video__iframe"></iframe>
            <h2 class="brand-video__title">
                Vinhomes Cần Giờ ra mắt đợt 1: Nhà 'tựa rừng, view hồ' 800 ha
            </h2>
            <div class="brand-video__brand">
                <img src="../assets/images/Vector (1).svg" alt="Logo SmartAds" class="Logo-SmartAds">

                <div class="logo__content">
                    <img src="../assets/images/SmartAds.svg" alt="SmartAds" class="SmartAds">

                    <div class="logo__sub-content">
                        <img src="../assets/images/Vector.svg" alt="Power by" class="Power-by">
                        <img src="../assets/images/Group 44.svg" alt="Fpt Online" class="Fpt-Online">
                    </div>
                </div>
                <p class="divider">|</p>
                <p>Sponsored by <strong>Vincomes Home</strong></p>
                <img src="../assets/images/verified 1.svg" alt="Xác nhận">
            </div>
        </div>
    </div>
</body>
</html>
