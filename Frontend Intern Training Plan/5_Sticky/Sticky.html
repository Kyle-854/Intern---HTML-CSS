<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky</title>
    <link rel="stylesheet" href="./css/StickyStyle.css">
</head>
<body>
    <div class="sticky">
        <button class="sticky__Close">
            <img src="../assets/images/close_fill.svg" alt="Close">
        </button>
        <div class="sticky__content">
            <div class="sticky__subcontent">
                <div class="sticky__Img">
                    <img src="../assets/images/Event image.png" alt="Ảnh">
                </div>

                <div class="sticky__Info">
                    <h2 class="sticky__title">Biệt thự song lập, đơn lập view biển hồ 800 ha, cạnh 2 sân golf</h2>

                    <div class="sticky__brand">
                        <img src="../assets/images/logo-sma.svg" alt="Logo SmartAds" class="Logo-SmartAds">

                        <div class="logo__content">
                            <img src="../assets/images/SmartAds.svg" alt="SmartAds" class="SmartAds">

                            <div class="logo__sub-content">
                                <img src="../assets/images/Vector.svg" alt="Power by" class="Power-by">
                                <img src="../assets/images/Group 44.svg" alt="Fpt Online" class="Fpt-Online">
                            </div>
                        </div>
                        <p class="divider">|</p>
                        <p><strong>CEI Vietnam</strong></p>
                        <img src="../assets/images/verified 1.svg" alt="Xác nhận">
                    </div>
                </div>
            </div>
            <div class="sticky__button">
                <a class="btn-Tu-Van text-PC" href="#">Tư vấn miễn phí</a>
                <a class="btn-Tu-Van text-Mobile" href="#">
                    <img src="../assets/images/arrow_right_line.svg" alt="Mũi tên phải">
                </a>
            </div>
        </div>
    </div>
</body>
</html>
