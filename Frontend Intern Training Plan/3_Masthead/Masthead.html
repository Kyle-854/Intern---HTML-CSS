<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masthead 1</title>
    <link rel="stylesheet" href="./css/MastheadStyle.css">
</head>
<body>
    <div class="masthead">
        <div class="masthead__content">
            <div class="masthead__subcontent">
                <img class="__logo" src="../assets/images/image (2).png" alt="logo">
                <h2 class="__title">Bcons City Dĩ An 2,2 tỷ đồng căn 2 phòng ngủ, giao nhà hoàn thiện</h2>
                <div class="masthead__brand">
                    <img src="../assets/images/logo-sma-color.svg" alt="logo SMA">
                    <p class="divider">|</p>
                    <p>Sponsored <strong>Bcons Home</strong></p>
                    <img class="verified" src="../assets/images/logo-verified.svg" alt="">
                </div>
            </div>
        </div>
        <div class="masthead__Img">
            <img src="../assets/images/image (3).png" alt="">
        </div>
    </div>
</body>
</html>
