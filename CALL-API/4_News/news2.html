<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News 2 - remake</title>
    <link rel="stylesheet" href="./css/news2.css">
</head>
<body>
    <div class="news">
        <button id="news__close-button">
            <img src="../assets/images/close_fill.svg" alt="ic_close">
        </button>

        <div class="news__content-container">
            <div class="news__img">
                <img src="../assets/images/People.png" alt="image">
            </div>

            <div class="news__content">
                <h2 class="news__title">
                    Bcons City Dĩ An 2,2 tỷ đồng căn 2 phòng ngủ, giao nhà hoàn thiện
                </h2>

                <div class="news__brand">
                    <a class="logoSMA" href="https://smartads.tech/" target="_blank">
                        <img class="logoSMA" src="../assets/images/logo-sma-color.svg" alt="logoSMA">
                    </a>
                    <div class="divider"></div>
                    <a class="partner" target="_blank"> <span>Sponsored</span> <strong>Bcons Home</strong></a>
                    <img class="verified" src="../assets/images/logo-verified.svg" alt="verified">
                </div>
            </div>
        </div>

        <a class="news__button" href="#">
            <img src="../assets/images/arrow_right_line.svg" alt="ic_arrow_right_line">
        </a>
    </div>

    <script src="../api/news2-api.js"></script>
    <script>
        loadData(1);
    </script>

    <script>
        const closeButton = document.getElementById('news__close-button');

        closeButton.addEventListener('click', function(event){
            document.body.style.display = 'none';
            event.stopPropagation();
        });
    </script>
</body>
</html>
