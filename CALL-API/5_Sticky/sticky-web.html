<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Web</title>
    <link rel="stylesheet" href="./css/sticky-web.css">
</head>
<body>
    <div class="sticky">

        <button id="sticky__close-button">
            <img src="../assets/images/close_fill.svg" alt="ic_close">
        </button>

        <div class="sticky__content-container">
            <div class="sticky__img">
                <img src="../assets/images/Event image.png" alt="image">
            </div>

            <div class="sticky__content">
                <h2 class="sticky__title">
                    Biệt thự song lập, đơn lập view biển hồ 800 ha, cạnh 2 sân golf
                </h2>

                <div class="sticky__brand">
                    <div class="logo-container">
                        <img class="logoSMA" src="../assets/images/logo-sma.svg" alt="logoSMA">

                        <div class="logo2">
                            <img class="textSMA" src="../assets/images/logo-sma-text.svg" alt="textSMA">

                            <div class="power">
                                <img class="powered-by" src="../assets/images/logo-powered-by-text.svg" alt="powered-by">
                                <img class="FPT-Online" src="../assets/images/logo-fpt-online.svg" alt="fpt-online">
                            </div>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <p class="partner"><strong>CEI Vietnam</strong></p>
                    <img class="verified" src="../assets/images/logo-verified.svg" alt="verified">
                </div>
            </div>
        </div>

        <a href="#" class="sticky__button-cta">
            Tư vấn miễn phí
        </a>
    </div>

    <script src="../api/sticky-api.js"></script>

    <script>
        const closeButton = document.getElementById('sticky__close-button');

        closeButton.addEventListener('click', function(event){
            document.body.style.display = 'none';
            event.stopPropagation();
        });
    </script>
</body>
</html>
