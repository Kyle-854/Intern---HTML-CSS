<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ads 1 - remake</title>
    <link rel="stylesheet" href="./css/video-ads1.css">
</head>
<body>
    <div class="video-ads">
        <button id="video-ads__close-button">
            <img src="../assets/images/close_fill.svg" alt="ic_close">
        </button>

        <div class="video-ads__content">
            <h2 class="video-ads__title">
                Bcons City Dĩ An 2,2 tỷ đồng căn 2 phòng ngủ, giao nhà hoàn thiện
            </h2>

            <div class="video-ads__brand">
                <div class="logo-container">
                    <img class="logoSMA" src="../assets/images/logo-sma.svg" alt="logoSMA">

                    <div class="logo2">
                        <img class="textSMA" src="../assets/images/logo-sma-text.svg" alt="textSMA">

                        <div class="power">
                            <img class="powered-by" src="../assets/images/logo-powered-by-text.svg" alt="powered-by">
                            <img class="FPT-Online" src="../assets/images/logo-fpt-online.svg" alt="fpt-online">
                        </div>
                    </div>
                </div>
                <div class="divider"></div>
                <p class="partner">Sponsored by <strong>Bcons Home</strong></p>
                <img class="verified" src="../assets/images/logo-verified.svg" alt="verified">
            </div>
        </div>

        <div class="video-ads__Img">
            <img src="../assets/images/video-ads.png" alt="image">
        </div>
    </div>

    <script>
        const closeButton = document.getElementById('video-ads__close-button');

        closeButton.addEventListener('click', function(){
            document.body.style.display = 'none';
        });
    </script>
</body>
</html>
