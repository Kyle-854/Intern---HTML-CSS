<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masthead - remake</title>
    <link rel="stylesheet" href="./css/masthead.css">
</head>
<body>
    <div class="masthead">
        <div class="masthead__content-container">
            <div class="masthead__content">
                <a class="icon-container">
                    <img class="icon" src="../../assets/images/image (2).png" alt="icon">
                </a>

                <h2 class="masthead__title">
                    Bcons City Dĩ An 2,2 tỷ đồng căn 2 phòng ngủ, giao nhà hoàn thiện
                </h2>

                <div class="masthead__brand">
                    <a class="logoSMA" href="https://smartads.tech/" target="_blank">
                        <img class="logoSMA" src="../../assets/images/logo-sma-color.svg" alt="logoSMA">
                    </a>
                    <div class="divider"></div>
                    <a class="partner"> <span>Sponsored</span> <strong>Bcons Home</strong></a>
                    <img class="verified" src="../../assets/images/logo-verified.svg" alt="verified">
                </div>
            </div>
        </div>

        <div class="masthead__img">
            <img src="../../assets/images/image (3).png" alt="Image">
        </div>
    </div>

    <script src="../api/masthead-api.js"></script>
</body>
</html>
