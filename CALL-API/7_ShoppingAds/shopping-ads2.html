<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Ads 2</title>
    <link rel="stylesheet" href="./css/shopping-ads2.css">
</head>
<body>
    <div class="shopping-ads">
        <a class="logo-sma" href="https://smartads.tech/" target="_blank">
            <img class="logo1" src="../../assets/images/logo-sma.svg" alt="logo-SMA1">
            <div class="logo23">
                <img class="logo2" src="../../assets/images/logo-sma-color.svg" alt="logo-SMA2">
                <img class="logo3" src="../../assets/images/logo-sma-text.svg" alt="logo-SMA3">
            </div>
        </a>

        <button id="up-button">
            <img src="../../assets/images/arrow_up_line.svg" alt="left">
        </button>

        <div class="shopping-ads__wrapper">
            <!-- items-container1 -->
            <div class="items-container temp-container" style="display: none;">
                <!-- item1 -->
                <div class="item temp-item" style="display: none;">
                    <div class="item__img">
                        <img src="../../assets/images/Ads.png" alt="adidas">
                    </div>

                    <div class="item__content">
                        <p class="item__name">
                            Giày Sneaker Nam Adidas Grand Court Cloudfoam Comfort - Trắng
                        </p>

                        <div class="item__price1">
                            <p class="price1">1.690.000</p>
                            <p class="price1 unit1">đ</p>
                        </div>
                        
                        <div class="item__price2">
                            <p class="price2">1.490.000</p>
                            <p class="price2 unit2">đ</p>
                        </div>

                        <p class="item__recommend">Được yêu thích nhất</p>

                        <a class="item__brand" target="_blank">
                            <img class="brand__logo" src="../../assets/images/icon_logo_adidas.png" alt="logo">
                            <p class="brand__name">Adidas</p>
                            <img class="verified" src="../../assets/images/logo-verified.svg" alt="verified">
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <button id="down-button">
            <img src="../../assets/images/arrow_down_line.svg" alt="right">
        </button>
    </div>

    <script src="../api/shopping-ads2-api.js"></script>
    <script>
        loadData(16);
    </script>
    <script src="./js/shopping-ads2.js"></script>
</body>
</html>
